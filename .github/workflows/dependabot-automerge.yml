name: Dependabot Auto-Merge

# Runs on a schedule from main branch, so it works for PRs targeting ANY branch
# (daisyui, shadcn, testing, main) without needing the workflow on each branch.
on:
  schedule:
    - cron: '0 12 * * 1-5' # Noon UTC, weekdays
  workflow_dispatch: # Allow manual trigger

permissions:
  pull-requests: write
  contents: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    steps:
      - name: Merge open Dependabot PRs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Finding open Dependabot PRs..."
          prs=$(gh pr list --repo ${{ github.repository }} --author "app/dependabot" --state open --json number,title --jq '.[].number')

          if [ -z "$prs" ]; then
            echo "No open Dependabot PRs found."
            exit 0
          fi

          for pr in $prs; do
            echo "Attempting to merge PR #$pr..."
            if gh pr merge "$pr" --repo ${{ github.repository }} --squash --delete-branch; then
              echo "Successfully merged PR #$pr"
            else
              echo "Failed to merge PR #$pr (may have conflicts), skipping..."
            fi
          done

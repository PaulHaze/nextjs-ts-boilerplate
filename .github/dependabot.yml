# To get started with Dependabot version updates, you'll need to specify which
# package ecosystems to update and where the package manifests are located.
# Please see the documentation for all configuration options:
# https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday' # Specify day to make it more predictable
      time: '09:00' # Specify time
      timezone: 'UTC'
    target-branch: 'main'
    open-pull-requests-limit: 25
    pull-request-branch-name:
      separator: '-'
    commit-message:
      prefix: 'chore(deps)'
      include: 'scope' # Better commit messages
    rebase-strategy: 'auto'
    allow:
      - dependency-type: 'direct'
      - dependency-type: 'development'
    versioning-strategy: 'increase-if-necessary'
    ignore:
      - dependency-name: '*'
        update-types: ['version-update:semver-major']
    labels:
      - 'dependencies'
      - 'automerge'
    reviewers:
      - 'PaulHaze' # Add yourself as reviewer for visibility

  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'tuesday' # Stagger the days to avoid conflicts
      time: '09:00'
      timezone: 'UTC'
    target-branch: 'daisyui'
    open-pull-requests-limit: 10
    pull-request-branch-name:
      separator: '-'
    commit-message:
      prefix: 'chore(deps)'
      include: 'scope'
    rebase-strategy: 'auto'
    allow:
      - dependency-type: 'direct'
      - dependency-type: 'development'
    versioning-strategy: 'increase-if-necessary'
    ignore:
      - dependency-name: '*'
        update-types: ['version-update:semver-major']
    labels:
      - 'dependencies'
      - 'automerge'
    reviewers:
      - 'PaulHaze'

  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'wednesday'
      time: '09:00'
      timezone: 'UTC'
    target-branch: 'shadcn'
    open-pull-requests-limit: 10
    pull-request-branch-name:
      separator: '-'
    commit-message:
      prefix: 'chore(deps)'
      include: 'scope'
    rebase-strategy: 'auto'
    allow:
      - dependency-type: 'direct'
      - dependency-type: 'development'
    versioning-strategy: 'increase-if-necessary'
    ignore:
      - dependency-name: '*'
        update-types: ['version-update:semver-major']
    labels:
      - 'dependencies'
      - 'automerge'
    reviewers:
      - 'PaulHaze'

  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'thursday'
      time: '09:00'
      timezone: 'UTC'
    target-branch: 'testing'
    open-pull-requests-limit: 10
    pull-request-branch-name:
      separator: '-'
    commit-message:
      prefix: 'chore(deps)'
      include: 'scope'
    rebase-strategy: 'auto'
    allow:
      - dependency-type: 'direct'
      - dependency-type: 'development'
    versioning-strategy: 'increase-if-necessary'
    ignore:
      - dependency-name: '*'
        update-types: ['version-update:semver-major']
    labels:
      - 'dependencies'
      - 'automerge'
    reviewers:
      - 'PaulHaze'
